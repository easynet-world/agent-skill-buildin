name: Release GHCR

on:
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      version:
        description: 'Optional version tag to publish (example: v0.1.0)'
        required: false

permissions:
  contents: read
  packages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    name: Publish Skill Artifact
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve tags
        id: tags
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            INPUT_VERSION="${{ github.event.inputs.version }}"
            if [ -n "$INPUT_VERSION" ]; then
              VERSION_TAG="$INPUT_VERSION"
            else
              VERSION_TAG="v$(node -p "require('./package.json').version")"
            fi
          else
            VERSION_TAG="v$(node -p "require('./package.json').version")"
          fi

          if [[ ! "$VERSION_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([-.].*)?$ ]]; then
            echo "Invalid version: $VERSION_TAG" >&2
            exit 1
          fi

          echo "version_tag=$VERSION_TAG" >> "$GITHUB_OUTPUT"
          echo "latest_tag=latest" >> "$GITHUB_OUTPUT"
          echo "sha_tag=sha-${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"
          echo "image=ghcr.io/${{ github.repository_owner }}/agent-skill-buildin" >> "$GITHUB_OUTPUT"

      - name: Prepare signing key
        shell: bash
        env:
          SKILL_SIGNING_PRIVATE_KEY_B64: ${{ secrets.SKILL_SIGNING_PRIVATE_KEY_B64 }}
        run: |
          set -euo pipefail
          if [ -z "${SKILL_SIGNING_PRIVATE_KEY_B64:-}" ]; then
            echo "Missing required secret: SKILL_SIGNING_PRIVATE_KEY_B64" >&2
            exit 1
          fi
          echo "$SKILL_SIGNING_PRIVATE_KEY_B64" | base64 -d > "$RUNNER_TEMP/skill-signing-private.pem"
          chmod 600 "$RUNNER_TEMP/skill-signing-private.pem"

      - name: Build artifact
        env:
          SIGNING_KEY_PATH: ${{ runner.temp }}/skill-signing-private.pem
        run: npm run build

      - name: Install ORAS
        uses: oras-project/setup-oras@v1

      - name: Login GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | oras login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Publish OCI artifact
        shell: bash
        run: |
          set -euo pipefail
          IMAGE="${{ steps.tags.outputs.image }}"
          VERSION_TAG="${{ steps.tags.outputs.version_tag }}"
          LATEST_TAG="${{ steps.tags.outputs.latest_tag }}"
          SHA_TAG="${{ steps.tags.outputs.sha_tag }}"

          oras push "$IMAGE:$SHA_TAG" \
            --artifact-type application/vnd.easynet.agent-skills.bundle.v1 \
            dist/skills.tgz:application/vnd.easynet.agent-skills.layer.v1.tar+gzip \
            dist/skills.tgz.sig:application/vnd.easynet.agent-skills.signature.v1+binary \
            dist/skills.tgz.sha256:text/plain

          oras tag "$IMAGE:$SHA_TAG" "$LATEST_TAG"
          oras tag "$IMAGE:$SHA_TAG" "$VERSION_TAG"

      - name: Summary
        run: |
          echo "Published: ${{ steps.tags.outputs.image }}:${{ steps.tags.outputs.sha_tag }}"
          echo "Published: ${{ steps.tags.outputs.image }}:${{ steps.tags.outputs.latest_tag }}"
          echo "Published: ${{ steps.tags.outputs.image }}:${{ steps.tags.outputs.version_tag }}"
