name: Release Skills

on:
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      version:
        description: 'Optional version tag to publish (example: v0.1.0)'
        required: false

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    name: Publish Skill Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release metadata
        id: release
        shell: bash
        run: |
          set -euo pipefail
          PACKAGE_VERSION="v$(node -p "require('./package.json').version")"

          if [[ ! "$PACKAGE_VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([-.].*)?$ ]]; then
            echo "Invalid package version: $PACKAGE_VERSION" >&2
            exit 1
          fi

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            INPUT_VERSION="${{ github.event.inputs.version }}"
            if [ -n "$INPUT_VERSION" ]; then
              RELEASE_TAG="$INPUT_VERSION"
            else
              RELEASE_TAG="$PACKAGE_VERSION"
            fi
          else
            RELEASE_TAG="$PACKAGE_VERSION"
          fi

          if [[ ! "$RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([-.].*)?$ ]]; then
            echo "Invalid release tag: $RELEASE_TAG" >&2
            exit 1
          fi

          echo "package_version=$PACKAGE_VERSION" >> "$GITHUB_OUTPUT"
          echo "release_tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"
          echo "release_title=agent-skill-buildin $PACKAGE_VERSION" >> "$GITHUB_OUTPUT"

      - name: Prepare signing key
        shell: bash
        env:
          SKILL_SIGNING_PRIVATE_KEY_B64: ${{ secrets.SKILL_SIGNING_PRIVATE_KEY_B64 }}
        run: |
          set -euo pipefail
          if [ -z "${SKILL_SIGNING_PRIVATE_KEY_B64:-}" ]; then
            echo "Missing required secret: SKILL_SIGNING_PRIVATE_KEY_B64" >&2
            exit 1
          fi
          echo "$SKILL_SIGNING_PRIVATE_KEY_B64" | base64 -d > "$RUNNER_TEMP/skill-signing-private.pem"
          chmod 600 "$RUNNER_TEMP/skill-signing-private.pem"
          openssl rsa -in "$RUNNER_TEMP/skill-signing-private.pem" -pubout -out "$RUNNER_TEMP/public.pem"

      - name: Build artifact
        env:
          SIGNING_KEY_PATH: ${{ runner.temp }}/skill-signing-private.pem
        run: npm run build

      - name: Enforce new version
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          RELEASE_TAG="${{ steps.release.outputs.release_tag }}"
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "Release $RELEASE_TAG already exists." >&2
            echo "Update package.json version before publishing a new skill bundle." >&2
            exit 1
          fi

      - name: Create or update GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          RELEASE_TAG="${{ steps.release.outputs.release_tag }}"
          RELEASE_TITLE="${{ steps.release.outputs.release_title }}"
          NOTES_FILE="$RUNNER_TEMP/release-notes.md"

          cat > "$NOTES_FILE" <<EOF
          Package version: ${{ steps.release.outputs.package_version }}
          Commit: ${{ github.sha }}

          Assets:
          - skills.zip
          - skills.zip.sig
          - skills.zip.sha256
          - public.pem
          EOF

          gh release create "$RELEASE_TAG" --target "${{ github.sha }}" --title "$RELEASE_TITLE" --notes-file "$NOTES_FILE"

      - name: Upload release assets
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh release upload "${{ steps.release.outputs.release_tag }}" \
            dist/skills.zip \
            dist/skills.zip.sig \
            dist/skills.zip.sha256 \
            "$RUNNER_TEMP/public.pem#public.pem" \
            --clobber

      - name: Summary
        run: |
          echo "Published release: ${{ steps.release.outputs.release_tag }}"
          echo "Package version: ${{ steps.release.outputs.package_version }}"
          echo "Assets: skills.zip, skills.zip.sig, skills.zip.sha256, public.pem"
